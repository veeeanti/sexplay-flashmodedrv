name: Build SEXPlay Flashmode Driver

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  SOLUTION_FILE: SEXPlay-FlashmodeDrv.sln
  DRIVER_PROJECT: SEXPlay-FlashmodeDrv/SEXPlay-FlashmodeDrv.vcxproj
  FILTER_PROJECT: SEXPlay-FlashmodeDrv/SEXPlayFlt/SEXPlayFlt.vcxproj

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSVC Environment
      uses: microsoft/setup-msbuild@v2

    - name: Setup Windows SDK
      run: |
        # Install Windows SDK
        $sdkUrl = "https://go.microsoft.com/fwlink/?linkid=2195769"
        $sdkInstaller = "$env:TEMP\winsdk_installer.exe"
        
        Write-Host "Downloading Windows SDK..."
        Invoke-WebRequest -Uri $sdkUrl -OutFile $sdkInstaller -UseBasicParsing
        
        Write-Host "Installing Windows SDK..."
        Start-Process -FilePath $sdkInstaller -ArgumentList "/quiet /norestart" -Wait -NoNewWindow
        
        Write-Host "Windows SDK installation complete"

    - name: Restore NuGet packages
      run: |
        # Check if nuget is available
        if (Get-Command nuget -ErrorAction SilentlyContinue) {
            nuget restore $env:SOLUTION_FILE
        } else {
            Write-Host "NuGet not found, skipping restore"
        }

    - name: Build Driver (x64 Debug)
      run: |
        msbuild $env:SOLUTION_FILE `
          /p:Configuration=Debug `
          /p:Platform=x64 `
          /p:WindowsTargetPlatformVersion=10.0.22621.0 `
          /t:Rebuild `
          /v:minimal

    - name: Build Driver (x64 Release)
      run: |
        msbuild $env:SOLUTION_FILE `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:WindowsTargetPlatformVersion=10.0.22621.0 `
          /t:Rebuild `
          /v:minimal

    - name: Build Driver (ARM64 Debug)
      run: |
        msbuild $env:SOLUTION_FILE `
          /p:Configuration=Debug `
          /p:Platform=ARM64 `
          /p:WindowsTargetPlatformVersion=10.0.22621.0 `
          /t:Rebuild `
          /v:minimal

    - name: Build Driver (ARM64 Release)
      run: |
        msbuild $env:SOLUTION_FILE `
          /p:Configuration=Release `
          /p:Platform=ARM64 `
          /p:WindowsTargetPlatformVersion=10.0.22621.0 `
          /t:Rebuild `
          /v:minimal

    - name: Copy build outputs
      run: |
        $outputDir = "${{ github.workspace }}/build_output"
        New-Item -ItemType Directory -Force -Path $outputDir
        
        # Copy x64 binaries
        Copy-Item -Path "x64\Debug\*.sys" -Destination "$outputDir\" -ErrorAction SilentlyContinue
        Copy-Item -Path "x64\Debug\*.pdb" -Destination "$outputDir\" -ErrorAction SilentlyContinue
        Copy-Item -Path "x64\Release\*.sys" -Destination "$outputDir\" -ErrorAction SilentlyContinue
        Copy-Item -Path "x64\Release\*.pdb" -Destination "$outputDir\" -ErrorAction SilentlyContinue
        
        # Copy ARM64 binaries
        Copy-Item -Path "ARM64\Debug\*.sys" -Destination "$outputDir\" -ErrorAction SilentlyContinue
        Copy-Item -Path "ARM64\Debug\*.pdb" -Destination "$outputDir\" -ErrorAction SilentlyContinue
        Copy-Item -Path "ARM64\Release\*.sys" -Destination "$outputDir\" -ErrorAction SilentlyContinue
        Copy-Item -Path "ARM64\Release\*.pdb" -Destination "$outputDir\" -ErrorAction SilentlyContinue
        
        # Copy INF file
        Copy-Item -Path "SEXPlay-FlashmodeDrv\SEXPlay-FlashmodeDrv.inf" -Destination "$outputDir\"
        
        Write-Host "Build outputs copied to $outputDir"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SEXPlay-FlashmodeDrv-Output
        path: build_output/
        retention-days: 30

    - name: List build outputs
      run: |
        Get-ChildItem -Path build_output -Recurse | Format-Table Name, Length -AutoSize

  sign:
    needs: build
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: SEXPlay-FlashmodeDrv-Output
        path: build_output

    - name: Display artifacts
      run: |
        Get-ChildItem -Path build_output | Format-Table Name, Length -AutoSize
        
    - name: Code signing (optional - uncomment and configure for production)
      run: |
        Write-Host "Code signing step - configure your certificate here"
        Write-Host "For production builds, you would sign the .sys files here"
        # SignTool sign /f certificate.pfx /p password /t http://timestamp.digicert.com build_output\*.sys

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: SEXPlay-FlashmodeDrv-Output
        path: release

    - name: Display release contents
      run: |
        ls -la release/
        find release -type f

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          release/*.sys
          release/*.inf
          release/*.pdb
        draft: false
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        generate_release_notes: true
        name: SEXPlay Flashmode Driver v${{ github.run_number }}
        body: |
          ## Build Information
          
          - **Build Number:** ${{ github.run_number }}
          - **Commit:** ${{ github.sha }}
          - **Branch:** ${{ github.ref }}
          
          ## Included Files
          
          - SEXPlay-FlashmodeDrv.sys (Function driver)
          - SEXPlayFlt.sys (Filter driver)
          - SEXPlay-FlashmodeDrv.inf (Installation file)
          - PDB debug files
          
          ## Supported Devices
          
          - Sony Ericsson Flash devices (VID 0x0FCE)
          - DFU devices
          - HCB-100/105/108/120
          - MBS-200, AB900
          
          ## Installation
          
          1. Extract all files to a folder
          2. Right-click on the INF file and select "Install"
          3. Or use devcon to install: `devcon install SEXPlay-FlashmodeDrv.inf USB\VID_0FCE&PID_1DDE`
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
